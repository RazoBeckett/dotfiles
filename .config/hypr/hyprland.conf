# Monitor configuration
monitor=eDP-1,1920x1080@144,0x0,1

# Default applications
$terminal = ghostty
$fileManager = nautilus
$browser = zen-browser
$menu = rofi -show drun -matching fuzzy

source = ~/.config/hypr/modules/env.conf

# core daemons
exec-once = uwsm app -- waybar
exec-once = uwsm app -- hyprpaper
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- nm-applet
# exec-once = bash ~/.local/bin/RainbowBorders.sh
exec-once = uwsm app -- /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user start swaync
# exec-once = systemctl --user start voxtype
exec-once = uwsm app -- wl-paste --watch cliphist store
# exec-once = vicinae server
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Cursor config
exec-once = hyprctl setcursor "Banana-Catppuccin-Mocha" 40
exec = gsettings set org.gnome.desktop.interface cursor-theme "Banana-Catppuccin-Mocha"
exec = gsettings set org.gnome.desktop.interface cursor-size 40

# Auto-launch applications
exec-once = $terminal
exec-once = $browser

input {
    repeat_rate = 34
    repeat_delay = 150
    kb_layout = us
    kb_options = ctrl:nocaps, ALT_R:backspace
    follow_mouse = 1
    accel_profile = flat
    sensitivity = 0.2
    numlock_by_default = true

    touchpad {
        natural_scroll = yes
        tap_button_map = lmr
    }
}

cursor {
    no_hardware_cursors = true
}

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(42424EEE)
    col.inactive_border = rgba(342D31AA)
    layout = master
    resize_on_border = true
    # no_border_on_floating = false
    # allow_tearing = false
}

xwayland {
    force_zero_scaling = true
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = true
        size = 4
        passes = 3
        # vibrancy = 0.1696
        # new_optimizations = on
        # ignore_opacity = off
    }
    # drop_shadow = no
    # shadow_range = 4
    # shadow_render_power = 1
    # col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 0, ease
}

dwindle {
    preserve_split = true
    # pseudotile = true
}

master {
    new_status = salve
}

# gestures {
#     workspace_swipe = true
#     workspace_swipe_cancel_ratio = 0.1
# }

gesture = 3, horizontal, workspace
gesture = 3, down, dispatcher, exec, flameshot gui
gesture = 3, up, scale: 1.5, fullscreen
gesture = 4, down, mod: SUPER SHIFT, dispatcher, exec, notify-send 'Shutting down' && poweroff
# gesture = 3, up, dispatcher, togglespecialworkspace, magic
gesture = 3, pinchout, dispatcher, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#gesture = 3, pinchout, dispatcher, togglespecialworkspace, magic

# misc {
#     vfr = false
#     vrr = 0
#     disable_hyprland_logo = true
#     disable_splash_rendering  = true
#     force_default_wallpaper = -1
# }

ecosystem {
    no_update_news = true
}

debug {
    disable_logs = false
}

# windowrulev2 = float,class:^(pavucontrol)$

# Source window rules
source = ~/.config/hypr/modules/windowrule.conf

# sources the keybinds file
source = ~/.config/hypr/modules/keybinds.conf
